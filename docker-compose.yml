version: "3.8"

services:
  backup-agent:
    build: .
    image: backup-agent:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Optional: allow overriding AWS region / other env vars here
    volumes:
      - ./backups:/backups
      - ./appsettings.json:/app/appsettings.json:ro
    restart: unless-stopped
