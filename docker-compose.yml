version: "3.8"

services:
  pg-backup:
    image: postgres:16
    volumes:
      - ./backups:/backups

  pg-restore-target:
    image: postgres:16
    environment:
      POSTGRES_USER: restore_user
      POSTGRES_PASSWORD: restore_pass
      POSTGRES_DB: restore_db
    ports:
      - "5433:5432"
    volumes:
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restore_user -d restore_db"]
      interval: 10s
      timeout: 5s
      retries: 5
